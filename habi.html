<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Cake</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
font-family:Arial;
overflow:hidden;
}

h1{
color:white;
text-shadow:0 0 10px black;
}

.scene{
perspective:800px;
margin-top:40px;
}

.cake{
position:relative;
width:200px;
height:200px;
transform-style:preserve-3d;
animation:rotate 8s infinite linear;
}

@keyframes rotate{
0%{transform:rotateY(0deg);}
100%{transform:rotateY(360deg);}
}

.layer{
position:absolute;
width:200px;
height:60px;
background:#ff4757;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

.layer:nth-child(1){top:120px;background:#ff6b81;}
.layer:nth-child(2){top:60px;background:#ff4757;}
.layer:nth-child(3){top:0;background:#ff6b81;}

.candle{
position:absolute;
width:12px;
height:40px;
background:white;
top:-40px;
left:94px;
border-radius:3px;
}

.flame{
position:absolute;
top:-18px;
left:-2px;
width:16px;
height:20px;
background:orange;
border-radius:50%;
box-shadow:0 0 15px yellow;
animation:flicker .2s infinite;
}

@keyframes flicker{
0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}
}

button{
margin-top:40px;
padding:12px 25px;
border:none;
border-radius:20px;
background:#2ed573;
color:white;
font-size:18px;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.confetti{
position:absolute;
width:10px;
height:10px;
background:yellow;
top:-10px;
animation:fall 3s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-100px);}
100%{transform:translateY(800px);}
}

</style>
</head>

<body>

<h1>🎉 Happy Birthday 🎉</h1>
<h2 style="color:white;">Abderrahmen Ouhibi</h2>

<div class="scene">
<div class="cake">

<div class="layer"></div>
<div class="layer"></div>
<div class="layer"></div>

<div class="candle">
<div class="flame" id="flame"></div>
</div>

</div>
</div>

<button onclick="celebrate()">Blow Candle 🎂</button>

<script>

function celebrate(){

document.getElementById("flame").style.display="none";

for(let i=0;i<40;i++){

let conf=document.createElement("div");
conf.className="confetti";
conf.style.left=Math.random()*window.innerWidth+"px";
conf.style.background="hsl("+Math.random()*360+"deg,100%,50%)";
conf.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(conf);

}

alert("🎉 Happy Birthday Abderrahmen Ouhibi 🎂");

}

</script>

</body>
</html>
